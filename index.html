<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>资源搜索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f2f4f7;padding:20px;display:flex;justify-content:center;align-items:center;height:100vh}
.popup{background:#fff;border-radius:20px;width:100%;max-width:420px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1);max-height:90vh;overflow:hidden}
.title{text-align:center;font-size:24px;font-weight:bold;margin-bottom:20px}
.input{width:100%;padding:16px;border:1px solid #e5e7eb;border-radius:14px;font-size:16px;margin-bottom:12px;outline:0;background:#f9fafb}
.btn{width:100%;padding:16px;background:#007aff;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:500}
.btn:active{background:#0062cc}
.tip{text-align:center;font-size:13px;color:#888;margin-top:8px;margin-bottom:12px}

/* 热门推荐（使用原每日更新样式） */
.hot{margin-top:16px}
.hot-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;padding-left:4px;
}
.hot-title{font-size:14px;color:#ff7b00;font-weight:bold;}
.hot-date{font-size:12px;color:#888;}

.hot-scroll{
  max-height:120px; overflow-y:auto; padding-right:4px;
}
.hot-item{
    display:flex;justify-content:space-between;align-items:center;
    background:#fff7e6;padding:8px 10px;border-radius:10px;margin-bottom:6px;gap:6px
}
.hot-name{font-size:13px;color:#333;flex:1}
.hot-btns{display:flex;gap:4px}
.hot-go{
    font-size:12px;padding:4px 8px;border-radius:6px;
    color:#fff;text-decoration:none;white-space:nowrap
}
.baidu{background:#4292e6}
.quark{background:#1cb0ff}
.xunlei{background:#f60}

.result{
  margin-top:10px;
  display:none;
  max-height:380px;
  overflow-y:auto;
  padding-right:4px;
}
.item{
  padding:14px;
  border-bottom:1px solid #f0f0f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px
}
.item a{color:#007aff;text-decoration:none;flex:1}
.copy{background:#34c759;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
.copied{background:#007aff}
.broken{background:#ff3b30;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.empty{text-align:center;padding:20px;color:#999}
.tag{padding:4px 6px; border-radius:6px; font-size:11px; color:#fff; white-space:nowrap;}
.other{background:#999}
.highlight{color:#ff3b30;font-weight:bold;}
</style>
</head>

<body>
<div class="popup">
  <div class="title">🔍 资源搜索</div>
  <input type="text" class="input" id="key" placeholder="点这里输入搜索内容" onkeydown="if(event.key==='Enter')search()">
  <button class="btn" onclick="search()">立即搜索</button>

  <div class="tip">点击蓝色字体跳转链接</div>
  <div class="result" id="result"></div>

  <!-- 热门推荐（原每日更新样式） -->
  <div class="hot">
    <div class="hot-header">
      <div class="hot-title">🔥 热门推荐</div>
    </div>
    <div class="hot-scroll" id="hotList"></div>
  </div>
</div>

<script>
// ==============================================================
//          👇👇👇 【这里是 公开资源 / 热门推荐】👇👇👇
const ALL_RESOURCES = `
【纪录片】阿波罗11号（2019）BD1080P.中英双字 https://pan.baidu.com/s/1kt3OCUtmeLMLiDlztuqK2w?pwd=mumu https://pan.xunlei.com/s/VOq0KJnyOBKsCZjWP3I3qKlWA1?pwd=z36f#
【美剧】亢奋 第三季（首播01集） https://pan.baidu.com/s/1wDUECPb9ybxlGpQgKGWqLQ?pwd=mumu https://pan.quark.cn/s/2f098bee5901 https://pan.xunlei.com/s/VOq3hApoEt4dCO4Mav6mKkeEA1?pwd=fack
`;
//          👆👆👆 【公开资源 / 热门推荐 结束】👆👆👆
// ==============================================================

// ==============================================================
//          👇👇👇 【这里是 私密资源】👇👇👇
const SECRET_RESOURCES = `
【美剧】可以开干.DTF圣路易日记（2026）1080P.中英双字.全7集
https://pan.baidu.com/s/11RZ7dKNn1waECAdNEDMmSA?pwd=mumu
【美剧】可以开干.DTF圣路易日记（2026）1080P.中英双字.全7集
https://pan.xunlei.com/s/VOq3lltPgffTT7249w1pCP5wA1?pwd=8ea8#
逐玉（2026）全4K
https://pan.baidu.com/s/1mOfXW8qtRwn9Z-IK3HkPrw?pwd=mumu
逐玉（2026）全4K
https://pan.xunlei.com/s/VOq0qiKDFNYMKlwilQJaHWh7A1?pwd=bucj#
`;
//          👆👆👆 【私密资源 结束】👆👆👆
// ==============================================================

// ==========================================
//  ✅ 接收通知的邮箱
// ==========================================
const YOUR_EMAIL = "你的邮箱@qq.com";  


// ===================== 以下代码完全不用动 ======================
let publicList = [];
let secretList = [];

function parseLine(line) {
  const parts = line.split(/\s+/).filter(i=>i);
  const urls = parts.filter(p=>p.startsWith("http"));
  const name = parts.filter(p=>!p.startsWith("http")).join(" ");
  return {name,urls};
}
function parsePublic(text){
  text.trim().split("\n").filter(l=>l.trim()).forEach(line=>{
    const {name,urls}=parseLine(line);
    urls.forEach(u=>publicList.push({name,url:u}));
  });
}
function parseSecret(text){
  const lines=text.trim().split("\n").map(l=>l.trim()).filter(l=>l);
  let cur="";
  lines.forEach(line=>{
    if(line.startsWith("http")){
      if(cur)secretList.push({name:cur,url:line});
    }else{cur=line;}
  });
}
function highlightName(s){
  return s.replace(/（[^）]*?(集|更至|首播|全)[^）]*）/g,m=>`<span class="highlight">${m}</span>`);
}

parsePublic(ALL_RESOURCES);
parseSecret(SECRET_RESOURCES);

// 加载热门推荐
function loadHotList(){
  let h="";
  ALL_RESOURCES.trim().split("\n").filter(l=>l.trim()).forEach(line=>{
    const {name,urls}=parseLine(line);
    let btns="";
    urls.forEach(u=>{
      if(u.includes("baidu"))btns+=`<span class="hot-go baidu">百度</span>`;
      if(u.includes("quark"))btns+=`<span class="hot-go quark">夸克</span>`;
      if(u.includes("xunlei"))btns+=`<span class="hot-go xunlei">迅雷</span>`;
    });
    h+=`<div class="hot-item" onclick="goSearch('${name}')">
      <span class="hot-name">${highlightName(name)}</span>
      <div class="hot-btns">${btns}</div>
    </div>`;
  });
  document.getElementById("hotList").innerHTML=h;
}

loadHotList();

function search(){
  const key=document.getElementById("key").value.trim();
  const res=document.getElementById("result");
  if(!key){alert("请输入内容");return;}
  const list=[...publicList,...secretList].filter(i=>i.name.includes(key));
  if(list.length===0){res.innerHTML='<div class="empty">未找到资源</div>';res.style.display="block";return;}
  let h="";
  list.forEach(i=>{
    let tag="链接",cls="other";
    if(i.url.includes("baidu")){tag="百度";cls="baidu";}
    if(i.url.includes("quark")){tag="夸克";cls="quark";}
    if(i.url.includes("xunlei")){tag="迅雷";cls="xunlei";}
    h+=`<div class="item">
      <a href="${i.url}" target="_blank">${highlightName(i.name)}</a>
      <div class="tag ${cls}">${tag}</div>
      <button class="copy" onclick="copy('${i.url}',this)">复制</button>
      <button class="broken" onclick="report('${encodeURIComponent(i.name)}','${encodeURIComponent(i.url)}')">失效</button>
    </div>`;
  });
  res.innerHTML=h;res.style.display="block";
}

function report(name,url){
  name=decodeURIComponent(name);
  url=decodeURIComponent(url);
  const content=`📛资源失效\n名称：${name}\n链接：${url}`;
  window.open(`mailto:${YOUR_EMAIL}?subject=【资源失效】${name}&body=${encodeURIComponent(content)}`);
  alert("✅ 反馈成功！\n通知已发送至管理员邮箱");
}

function copy(url,btn){
  navigator.clipboard.writeText(url).then(()=>{
    btn.innerText="已复制";btn.classList.add("copied");
    setTimeout(()=>{btn.innerText="复制";btn.classList.remove("copied");},1500);
  });
}

function goSearch(w){
  document.getElementById("key").value=w;
  search();
}

window.onload=()=>document.getElementById("key").focus();
</script>
</body>
</html>
